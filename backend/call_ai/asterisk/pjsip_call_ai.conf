; Example PJSIP trunk/endpoint snippets for inbound AI receptionist routing.
; Merge with your existing /etc/asterisk/pjsip.conf setup.

[reception-desk]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=ulaw
aors=reception-desk
auth=reception-desk

[reception-desk]
type=auth
auth_type=userpass
username=reception-desk
password=change_this_secure_password

[reception-desk]
type=aor
max_contacts=1

[emergency-desk]
type=endpoint
transport=transport-udp
context=from-internal
disallow=all
allow=ulaw
aors=emergency-desk
auth=emergency-desk

[emergency-desk]
type=auth
auth_type=userpass
username=emergency-desk
password=change_this_secure_password

[emergency-desk]
type=aor
max_contacts=1

; Example inbound DID route (adapt to your provider)
[from-provider]
exten => +94112223344,1,Goto(ai-hospital-receptionist,${EXTEN},1)
