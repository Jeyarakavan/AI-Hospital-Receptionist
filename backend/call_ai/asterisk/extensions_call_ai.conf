; Inbound dialplan for AI Hospital Receptionist (Asterisk)
; Include this file from your main extensions.conf:
;   #include "/etc/asterisk/extensions_call_ai.conf"

[ai-hospital-receptionist]
exten => _X.,1,NoOp(Inbound AI receptionist call for ${CALLERID(num)})
 same => n,Answer()
 same => n,Set(CHANNEL(language)=en)
 same => n,AGI(/opt/ai-hospital-receptionist/backend/call_ai/agi_entry.sh)
 same => n,Hangup()

; Optional emergency transfer target
[ai-emergency-route]
exten => s,1,NoOp(Emergency transfer from AI flow)
 same => n,Dial(PJSIP/emergency-desk,25)
 same => n,Playback(vm-nobodyavail)
 same => n,Hangup()

; Optional receptionist transfer target
[ai-human-handoff]
exten => s,1,NoOp(Human handoff from AI flow)
 same => n,Dial(PJSIP/reception-desk,25)
 same => n,Playback(vm-nobodyavail)
 same => n,Hangup()
